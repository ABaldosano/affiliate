<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinterest Affiliate — Arthur's Playbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .header {
      margin-bottom: 36px;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 22px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 4px;
      color: #b8860b;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 700;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #1a1a1a;
      line-height: 1.2;
      margin-bottom: 8px;
      font-family: 'Playfair Display', serif;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .section {
      margin-bottom: 36px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: #888;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 700;
    }

    .divider {
      flex: 1;
      height: 1px;
      background: #e0ddd8;
    }

    .hint {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      font-weight: 600;
    }

    .steps-list, .platforms-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .step {
      background: #f8f8f6;
      border: 1.5px solid #e0ddd8;
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: opacity 0.15s ease, background 0.15s ease;
      user-select: none;
    }

    .step:hover { background: #f2f0ec; }

    .step.done {
      background: #f0f7f0;
      border-color: #7dba7d;
      opacity: 0.65;
    }

    .step-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #eaf4fb;
      border: 2px solid #7db8d8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #1a5276;
      flex-shrink: 0;
      font-weight: 800;
      transition: all 0.15s ease;
    }

    .step.done .step-num {
      background: #f0f7f0;
      border-color: #7dba7d;
      color: #2d6a2d;
    }

    .step-title {
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.4;
      font-weight: 700;
      transition: all 0.15s ease;
    }

    .step.done .step-title {
      text-decoration: line-through;
      color: #aaa;
    }

    .step-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-top: 5px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .step.done .step-desc {
      display: none;
    }

    .platform {
      background: #f8f8f6;
      border: 1.5px solid #e0ddd8;
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .platform.highlight {
      border-left: 4px solid #1a5276;
      background: #eaf4fb;
      border-color: #7db8d8;
      border-left-color: #1a5276;
    }

    .platform.dim {
      opacity: 0.45;
    }

    .platform-rank {
      font-size: 22px;
      font-weight: 800;
      color: #ccc;
      min-width: 28px;
      font-family: 'Inter', sans-serif;
    }

    .platform.highlight .platform-rank {
      color: #1a5276;
    }

    .platform-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .platform-name {
      font-size: 15px;
      color: #1a1a1a;
      font-weight: 700;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .badge-blue { background: #eaf4fb; color: #1a5276; border: 1px solid #7db8d8; }
    .badge-amber { background: #fdf6e3; color: #b8860b; border: 1px solid #e8c84a; }

    .platform-url {
      font-size: 13px;
      color: #666;
      font-weight: 500;
      line-height: 1.5;
    }

    .note {
      background: #fdf6e3;
      border: 1.5px solid #e8c84a;
      border-left: 4px solid #b8860b;
      border-radius: 0 10px 10px 0;
      padding: 16px 18px;
      margin-bottom: 28px;
    }

    .note-title {
      font-size: 12px;
      font-weight: 800;
      color: #b8860b;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .note-body {
      font-size: 14px;
      color: #5a4010;
      line-height: 1.7;
      font-weight: 600;
    }

    .note-body span {
      color: #b8860b;
      font-weight: 800;
    }

    .footer {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      letter-spacing: 3px;
      margin-top: 8px;
      text-transform: uppercase;
      font-weight: 700;
      padding-top: 20px;
      border-top: 2px solid #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <p class="label">Affiliate Playbook</p>
      <h1>Pinterest × Affiliate</h1>
      <p class="subtitle">Reference card — come back when your Postal ID is ready</p>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-label">Step-by-step</span>
        <div class="divider"></div>
        <span class="hint">tap to check off</span>
      </div>
      <div class="steps-list" id="steps"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-label">Platforms — in order</span>
        <div class="divider"></div>
      </div>
      <div class="platforms-list" id="platforms"></div>
    </div>

    <div class="note">
      <p class="note-title">Before anything else</p>
      <p class="note-body">Get your Postal ID <span>(₱504)</span> → verify GCash → then sign up for platforms in order above.</p>
    </div>

    <p class="footer">Pinterest Affiliate Strategy · Arthur</p>

  </div>

  <script>
    const steps = [
      { num: 1, title: "Sign up for your affiliate platform", desc: "Involve Asia or Shopee Affiliates — get your account approved first" },
      { num: 2, title: "Find a trending, best-selling product", desc: "Browse trending or best-seller categories inside your platform" },
      { num: 3, title: "Create a Pinterest business account", desc: "Free to set up — use a niche name relevant to your product category" },
      { num: 4, title: "Copy the product title, description & grab your affiliate link", desc: "Use the platform's link generator — this is the link that tracks your commission" },
      { num: 5, title: "Create a pin — paste title, description, and destination link", desc: 'Use "Create Ad Pin" or standard pin — set destination link as your affiliate URL' },
      { num: 6, title: "Publish the pin", desc: "Repeat with new products consistently — volume is how this strategy compounds" },
    ];

    const platforms = [
      { rank: 1, name: "Involve Asia", url: "involveasia.com", desc: "GCash payout · PH merchants · low minimum withdrawal", badge: "Start here", badgeClass: "badge-blue", highlight: true, dim: false },
      { rank: 2, name: "Shopee Affiliates", url: "affiliate.shopee.ph", desc: "ShopeePay → GCash · Filipinos already trust Shopee", badge: null, highlight: true, dim: false },
      { rank: 3, name: "Lazada Affiliates", url: "lazada.com.ph/affiliates", desc: "Good backup · wide product range", badge: null, highlight: false, dim: false },
      { rank: 4, name: "Amazon Associates", url: "affiliate-program.amazon.com", desc: "Highest earning potential · unlock this last", badge: "After bank account", badgeClass: "badge-amber", highlight: false, dim: true },
    ];

    const done = new Set(JSON.parse(localStorage.getItem("done_steps") || "[]"));

    function saveState() {
      localStorage.setItem("done_steps", JSON.stringify([...done]));
    }

    function renderSteps() {
      const container = document.getElementById("steps");
      container.innerHTML = "";
      steps.forEach(step => {
        const isDone = done.has(step.num);
        const el = document.createElement("div");
        el.className = "step" + (isDone ? " done" : "");
        el.innerHTML = `
          <div class="step-num">${isDone ? "✓" : step.num}</div>
          <div>
            <p class="step-title">${step.title}</p>
            <p class="step-desc">${step.desc}</p>
          </div>
        `;
        el.addEventListener("click", () => {
          if (done.has(step.num)) done.delete(step.num);
          else done.add(step.num);
          saveState();
          renderSteps();
        });
        container.appendChild(el);
      });
    }

    function renderPlatforms() {
      const container = document.getElementById("platforms");
      container.innerHTML = "";
      platforms.forEach(p => {
        const el = document.createElement("div");
        el.className = "platform" + (p.highlight ? " highlight" : "") + (p.dim ? " dim" : "");
        el.innerHTML = `
          <span class="platform-rank">${p.rank}</span>
          <div>
            <div class="platform-name-row">
              <span class="platform-name">${p.name}</span>
              ${p.badge ? `<span class="badge ${p.badgeClass}">${p.badge}</span>` : ""}
            </div>
            <p class="platform-url">${p.url} · ${p.desc}</p>
          </div>
        `;
        container.appendChild(el);
      });
    }

    renderSteps();
    renderPlatforms();
  </script>
</body>
</html>
